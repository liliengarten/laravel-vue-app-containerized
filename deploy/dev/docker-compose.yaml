services:
  database:
    image: postgres:15-alpine
    container_name: ${DB_CONTAINER_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_CONTAINER_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_DB: ${DB_CONTAINER_NAME}
      POSTGRES_USER: ${DB_USERNAME} 
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - ${DB_PORT}
    networks:
      - ${NETWORK_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: ${PGADMIN_CONTAINER_NAME}
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${DB_PASSWORD}
    networks:
      - ${NETWORK_NAME}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - database

  backend:
    build:
      context: ../..
      dockerfile: ./deploy/dev/backend/Dockerfile
    container_name: ${BACKEND_CONTAINER_NAME}
    environment:
      DB_HOST: ${DB_HOST}
    expose:
      - ${BACKEND_PORT}
    networks:
      - ${NETWORK_NAME}
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ../..
      dockerfile: ./deploy/dev/frontend/Dockerfile
    container_name: ${FRONTEND_CONTAINER_NAME}
    networks:
      - ${NETWORK_NAME}
    ports:
      - ${FRONTEND_PORT}:5173

  nginx:
    image: nginx:stable-alpine
    container_name: ${NGINX_CONTAINER_NAME}
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    networks:
      - ${NETWORK_NAME}
    depends_on:
      backend:
        condition: service_started

networks:
  dummy-network:
    name: ${NETWORK_NAME}
    external: true

volumes:
  postgres_data:
  pgadmin_data:
